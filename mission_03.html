<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>To Do List</title>
<style>
    body{
        background-color: #f0f4f8;
        font-family: 'Arial', sans-serif;
        display: flex;
        justify-content: center;
        padding-top: 50px;
    }

    h1 {
    text-align: center;  
    }

    h3 {
    border-bottom: 2px solid #ddd; 
    padding-bottom: 10px;        
    margin-bottom: 15px;         
               
    }

    .container {
        width: 800px; 
        padding: 30px;
        margin: 0 auto;
    }

    input{
        width: 100%;
        padding: 15px;
        font-size: 16px;
        border: 1px solid #ddd;
        border-radius: 5px;
        box-sizing: border-box; 
        margin-bottom: 20px;
    }

    .list-container {
    display: flex; 
    justify-content: space-between; 
    }

    .column {
        width: 48%; 
    }

    ul {
        list-style: none; 
        padding: 0;
    }

    li {
        background: none;      
        border-bottom: 1px solid #ddd; 
        padding: 10px 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    button {
    background-color: #e0e7ff;         
    border: none;              
    padding: 5px 12px;         
    border-radius: 4px;        
    font-size: 12px;           
    }
</style>
</head>
<body>
    <div class="container"> <h1>UMC Study Plan</h1>
        <hr>
        <input type="text" id="todoInput" placeholder="할 일을 입력하세요">
        <div class="list-container">
            <div class="column"> <h3>해야 할 일</h3>
                <ul id="todoList"></ul>
            </div>
            <div class="column"> <h3>해낸 일</h3>
                <ul id="doneList"></ul>
            </div>
        </div>
    </div>

    <script text="text/javascript">
        const input = document.getElementById('todoInput');
        const todoList = document.getElementById('todoList');

        input.addEventListener('keydown', function(event){
            if (event.key === 'Enter'){
                console.log("엔터가 눌렸어요!");

                if (event.key === 'Enter' && input.value !== ""){
                    const li = document.createElement('li');
                   
                    li.innerHTML = `
                    <span> ${input.value}</span>
                    <button class="complete-btn" onclick="completeTodo(this)">완료</button>
                    `;
                    todoList.appendChild(li);
                    input.value = "";
                }
            }
        });

        function completeTodo(button){
            const li = button.parentElement;
            button.remove();

            li.innerHTML += `<button class="delete-btn" onclick="deleteTodo(this)">삭제</button>`;

            const doneList = document.getElementById('doneList');
            doneList.appendChild(li);
        }

        function deleteTodo(button){
            const li = button.parentElement;
            li.remove();
        }
     </script>
   
</body>
</html>
